<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nina Flores | Data Analyst</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#090909;
            color:white;
        }

        section{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:30px;
        }

        h1{
            font-size:70px;
        }

        h2{
            color:#64b5ff;
            margin-top:15px;
            font-size:30px;
        }

        p{
            max-width:700px;
            margin-top:25px;
            font-size:20px;
            color:#cfcfcf;
            line-height:1.7;
        }

        button{
            margin-top:40px;
            padding:18px 40px;
            font-size:18px;
            border:none;
            border-radius:50px;
            background:#1f8fff;
            color:white;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#4da8ff;
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<section>

<h1>Nina Flores</h1>

<h2>Data Analyst • Power BI • AI</h2>

<p>
Transforming data into meaningful insights through analytics,
business intelligence, and creative problem solving.
</p>

<button>View My Portfolio</button>

</section>

</body>

</html>
